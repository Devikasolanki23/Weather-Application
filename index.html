<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="input-container">
            <input type="text" class="search-input" placeholder="Enter Location"/>
            <button id="search" class="search-btn">Search</button>
        </div>
    </header>
    <main>
        <div class="weather-container">
<div class="temprature">27.3℃</div>
<div class="location-date">
    <div class="location">Delhi</div>
    <span class="time">12:15</span>
    <span class="Day">Monday</span>
    <span class="Date">2026-06-11</span>

</div>
<div class="weather-state">
    <img src="//cdn.weatherapi.com/weather/64x64/day/113.png" alt="icon" class="emoji"/>
    <div class="condition">Sunny</div>
</div>
     </div>
    </main>
   <script src="script.js"></script> 
</body>
</html>
